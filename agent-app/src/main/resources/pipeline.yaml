# ============================================================================
# Pipeline Configuration
#
# This file defines the entire pipeline wiring: event bus addresses, HTTP
# endpoint, field validation, agent settings, deterministic handlers, agent
# tools, and LLM client selection.
#
# Loaded at startup by PipelineConfigLoader from the classpath.
# Override the path via: -Dpipeline.config=my-config.yaml
# ============================================================================

# ── Event bus addresses ──────────────────────────────────────────────────────
addresses:
  inbound: "trade.failures"
  agent:   "agent.required"
  events:  "events.out"

# ── HTTP ingress ─────────────────────────────────────────────────────────────
http:
  port: 8080
  route: "/trade/failures"
  requestTimeoutMs: 10000

# ── Schema / field validation ────────────────────────────────────────────────
schema:
  caseIdField: "tradeId"
  allowedFields:
    - tradeId
    - reason
    - altIds
    - counterparty
    - instrument
    - notional
    - currency
    - settlementDate
    - book
    - venue
  requiredFields:
    - tradeId
    - reason

# ── Agent settings ───────────────────────────────────────────────────────────
agent:
  maxSteps: 8
  timeoutMs: 10000

# ── Deterministic handlers (reason → handler type + params) ──────────────────
# Supported types:
#   lookup-enrich  — looks up and enriches a missing identifier
#                    params: { identifier: "<name>" }
#   escalate       — escalates the failure for manual review
#                    params: (none)
handlers:
  - reason: "Missing ISIN"
    type: "lookup-enrich"
    params:
      identifier: "ISIN"

  - reason: "Invalid Counterparty"
    type: "escalate"

# ── Agent tools ──────────────────────────────────────────────────────────────
# Supported types:
#   publish-event  — publishes arbitrary domain events
#   raise-ticket   — creates a support ticket
#   lookup         — looks up reference/enrichment data (counterparty, security, settlement)
#   classify       — classifies failure category and severity
#   notify         — sends notifications (email, slack, pagerduty)
tools:
  - type: "publish-event"
  - type: "raise-ticket"
  - type: "lookup"
  - type: "classify"
  - type: "notify"

# ── LLM client ──────────────────────────────────────────────────────────────
# Supported types:
#   stub    — rule-based stub for local dev (no network calls)
#   openai  — calls a real LLM via OpenAI Chat Completions API
#             with function-calling for structured tool invocation.
#             Params: endpoint, apiKey (supports ${ENV_VAR} syntax), model
#
# To switch to a real LLM, comment out the stub section and uncomment
# the openai section below:
llm:
#  type: "stub"
  type: "openai"
  params:
    endpoint: "https://api.openai.com/v1"
    apiKey: "${OPENAI_API_KEY}"
    model: "gpt-4o"
# ── MCP server ───────────────────────────────────────────────────────
# When enabled, exposes the agent's tools via the Model Context Protocol
# (HTTP + SSE transport) so external MCP clients (e.g. Claude Desktop,
# IDEs) can discover and invoke them.
#
# Endpoints (relative to basePath):
#   GET  /sse             — SSE connection for JSON-RPC responses
#   POST /message         — JSON-RPC 2.0 request endpoint
#
# Supported JSON-RPC methods:
#   initialize, ping, tools/list, tools/call
mcp:
  enabled: true
  port: 3001
  basePath: ""