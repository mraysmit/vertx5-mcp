# ===========================================================================
# Java Util Logging (JUL) Configuration
#
# Loaded at startup via:
#   java -Djava.util.logging.config.file=src/main/resources/logging.properties
#
# When running from the classpath (fat JAR), this file is auto-detected by
# the LoggingConfigInitialiser in MainVerticle.
# ===========================================================================

# ── Handlers ─────────────────────────────────────────────────────────────────
# Console + rolling file
handlers = java.util.logging.ConsoleHandler, java.util.logging.FileHandler

# ── Global level ─────────────────────────────────────────────────────────────
.level = INFO

# ── Console handler ──────────────────────────────────────────────────────────
java.util.logging.ConsoleHandler.level     = INFO
java.util.logging.ConsoleHandler.formatter = java.util.logging.SimpleFormatter

# ── File handler (rolling, timestamp in filename) ───────────────────────────
# The pattern is overridden at startup by MainVerticle.initLogging() to embed
# the JVM start timestamp, e.g. logs/vertx-agent-2026-03-02_10-15-30-0.log
# %g = generation number (rotation index)
java.util.logging.FileHandler.pattern   = logs/vertx-agent-%g.log
java.util.logging.FileHandler.limit     = 10485760
java.util.logging.FileHandler.count     = 10
java.util.logging.FileHandler.append    = true
java.util.logging.FileHandler.formatter = java.util.logging.SimpleFormatter

# ── SimpleFormatter pattern ──────────────────────────────────────────────────
# 1$=date/time  2$=source  3$=logger name  4$=level  5$=message  6$=thrown
# ISO-8601 style: 2026-03-02T10:15:30.123+08:00 INFO [class.method] message
java.util.logging.SimpleFormatter.format = %1$tY-%1$tm-%1$tdT%1$tH:%1$tM:%1$tS.%1$tL%1$tz %4$-7s [%3$s] %5$s%6$s%n

# ── Application loggers ─────────────────────────────────────────────────────
dev.mars.sample.agent.level = INFO

# Uncomment for detailed agent/MCP debugging:
# dev.mars.sample.agent.runner.level = FINE
# dev.mars.sample.agent.mcp.level    = FINE
